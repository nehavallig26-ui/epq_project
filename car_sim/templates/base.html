<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Car Wind Tunnel</title>
  <!-- Tailwind CDN for this demo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <nav class="bg-slate-800 p-4">
    <div class="container mx-auto flex justify-between items-center">
      <a href="/" class="font-bold text-xl">CarTunnel</a>
      <div class="space-x-4">
        <a href="/configurator" class="hover:underline">Configurator</a>
        <a href="/windtunnel" class="hover:underline">Wind Tunnel</a>
        <a href="/dashboard" class="hover:underline">Dashboard</a>
        {% if session.username %}
          <span class="ml-4">Hi, {{ session.username }}</span>
          <a href="/logout" class="ml-2 text-red-400">Logout</a>
        {% else %}
          <a href="/login">Login</a>
          <a href="/register" class="ml-2">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container mx-auto p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
